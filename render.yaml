# Blueprint de deploy para o Render (https://render.com).
# Crie um banco Postgres (na Supabase ou no próprio Render) e configure DATABASE_URL.
services:
  - type: web
    name: controle-financeiro
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # Roda as migrations antes de iniciar e sobe o gunicorn
    startCommand: "flask db upgrade && gunicorn wsgi:app"
    envVars:
      - key: FLASK_APP
        value: wsgi.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false   # cole a connection string do Postgres da Supabase no painel
      - key: PYTHON_VERSION
        value: "3.12.10"
